apis:
  - aid: import-io:import-io-api
    name: Import.io API
    description: >-
      The Import.io API (v2.0) provides programmatic access to create,
      manage, and run web data extractors, as well as retrieve extracted
      data. Everything available in the UI can be done via the API including
      scheduling extractions, managing data pipelines, and exporting data
      in JSON, CSV, or Excel formats. Supports authenticated extraction
      for data behind login screens.
    humanURL: https://www.import.io
